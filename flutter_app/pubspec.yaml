name: analizai_app
description: AnalizAI - Yerel işletmeler için AI destekli analiz platformu
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

  # ═══ Firebase — Auth, Push, Analytics ═══
  firebase_core: ^3.8.1
  firebase_auth: ^5.4.1
  google_sign_in: ^6.2.2
  firebase_messaging: ^15.2.1
  firebase_analytics: ^11.4.1

  # ═══ HTTP — API çağrıları (Nominatim, Hugging Face, İyzico) ═══
  http: ^1.2.2

  # ═══ OCR — Fiyat regex ayıklama (web-safe, mobile için platform guard eklenecek) ═══
  # flutter_tesseract_ocr: sadece Android/iOS — web desteklenmiyor

  # ═══ State Management ═══
  provider: ^6.1.2

  # ═══ Local Storage / Cache ═══
  shared_preferences: ^2.3.4

  # ═══ UI ═══
  cupertino_icons: ^1.0.8
  fl_chart: ^0.69.2
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  flutter_rating_bar: ^4.0.1
  lottie: ^3.2.0

  # ═══ Utils ═══
  intl: ^0.19.0
  url_launcher: ^6.3.1
  path_provider: ^2.1.5
  connectivity_plus: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/tessdata/
